{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated Struct_ItemInBackpack_Status allItems = 2;
	repeated Struct_ItemAllProperty allProperty = 3;
}

//玩家购买NPC商店的物品到背包 购买成功会推送物品进入背包
message C2G_BuyItemFromNPCShop // IActorRequest
{
