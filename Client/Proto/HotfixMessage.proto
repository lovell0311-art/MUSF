	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 NPCUUID		= 1;	// NPC的实体ID
	int64 ItemUUID		= 2;	// 要购买的物品UUID
	int32 PosInBackpackX	= 3;	// 放入背包中的坐标
	int32 PosInBackpackY	= 4;
	int32 RemoteBuy			= 5;//是否远程购买
}

//玩家购买NPC商店的物品到背包  返回
message G2C_BuyItemFromNPCShop // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//将背包中的物品卖给商店
message C2G_SellingItemToNPCShop // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 NPCShopID		= 1;		// 商店UUID
	int64 ItemUUID	= 2;		// 卖出物品UUID
}

//将背包中的物品卖给商店  返回
message G2C_SellingItemToNPCShop // IActorResponse
{
    int32 RpcId = 90;
