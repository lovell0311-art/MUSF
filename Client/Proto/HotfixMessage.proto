//===========================镶嵌==================================
// Opcode = 11700
// 荧之石合成
message C2G_FluoreStoneCompose // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 Add4SetEquipItemUID		= 1;//+4以上套装装备UID
	int64 Add4ExcEquipItemUID		= 2;//+4以上卓越装备UID
	int64 RecycledGemsItemUID 		= 3;//再生宝石
	int64 CreateGemsItemUID 		= 4;//创造宝石
	int64 MayaGemsItemUID 			= 5;//玛雅宝石
}

// 荧之石合成  返回  成功后返回荧之石进入背包
message G2C_FluoreStoneCompose // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 荧光宝石合成
message C2G_FluoreGemsCompose // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 FluoreStoneItemUID		= 1;//荧之石(属性)
	int64 LightGemsItemUID 			= 2;//光之石
	int64 CreateGemsItemUID 		= 3;//创造宝石
	int64 MayaGemsItemUID 			= 4;//玛雅宝石
}

// 荧光宝石合成  返回  成功后返回荧光宝石进入背包
message G2C_FluoreGemsCompose // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 荧光宝石镶嵌
message C2G_FluoreGemsSet // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
