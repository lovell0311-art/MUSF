syntax = "proto3";
package ETHotfix;

// Opcode = 10000
// 根据GameUserId获取角色信息 通常在其他角色进入视野时请求  成功会推送一系列信息通知
message C2G_GetPlayerInfoByGameUserIdRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 GameUserId		= 1;
}

// 根据GameUserId获取角色信息  返回
message G2C_GetPlayerInfoByGameUserIdResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//--------属性结构-------------
message Struct_Property
{ 
	int32	PropID = 1;			// 属性ID
	int32	Value = 2;				// 属性值
}

//--------物品属性词条结构---------
message Struct_AttrEntry
{
	int32	PropId = 1;		// 配置表中的属性id
	int32	Level = 2;		// 属性等级
}

// 根据昵称获取角色GameUserId 角色不存在或者不在线时会返回对应错误码
message C2G_GetPlayerInfoByNickName // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	string NickName		= 1;
}

// 根据昵称获取角色GameUserId  返回
message G2C_GetPlayerInfoByNickName // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	int64 GameUserId		= 1;
}


//=========================背包============================
// Opcode = 11100
//---------背包中的物品状态-------------
message Struct_ItemInBackpack_Status
{
	// 背包所属玩家ID
	int64 GameUserId		= 1;
	// 物品唯一标识
	int64 ItemUID		= 2;
	// 物品配置表ID
	int32 ConfigID		= 3;
	// 物品类型ID
	int32 Type		= 4;
	// 物品在背包中的位置
	int32 PosInBackpackX	= 5;
	int32 PosInBackpackY	= 6;
	// 物品占用的格子
	int32 Width	= 7;
	int32 Height = 8;
	// 物品数量
	int32 Quantity	= 9;
	// 物品等级
	int32 ItemLevel	= 10;
}

// 物品所有的属性
message Struct_ItemAllProperty
{
	int64 ItemUUID = 1;
	repeated Struct_Property PropList = 2;
	repeated Struct_AttrEntry ExecllentEntry = 3;	// 卓越词条
	repeated Struct_AttrEntry ExtraEntry = 4;	// 额外属性词条。套装附带
	repeated Struct_AttrEntry SpecialEntry = 5;	// 特殊属性词条。翅膀
	int64 ConfigId = 6;
}

// 移动背包物品的位置 推送G2C_ItemsLocationChangeBackpack_notice
message C2G_MoveBackpackItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 2;
	int32 PosInBackpackX	= 3;
	int32 PosInBackpackY	= 4;
}

// 移动背包物品的位置  返回
message G2C_MoveBackpackItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}
// 背包添加新的物品(测试用)  推送G2C_ItemsIntoBackpack_notice
message C2G_AddBackpackItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int32 ItemConfigID		= 2;
	int32 PosInBackpackX	= 3;
	int32 PosInBackpackY	= 4;

	int32 Level = 5;	// 物品强化等级
	int32 Quantity = 6;	// 物品数量
	int32 OptListId = 7;// 使用配置表中的第几条追加属性 0 开始
	int32 OptLevel = 8;	// 追加等级
	int32 HasSkill = 9;	// 有技能
	int32 SetId = 10;	// 套装id 0/1
	repeated int32 OptionExcellent = 11;	// 卓越属性
	// 自定义属性方法
	// ItemRandomlyAddExcAttr_3		随机添加3条卓越属性
	repeated string CustomAttrMethod = 12;
	int32 FluoreAttr = 13;	// 荧光宝石属性 id:value/100  level:value%100
	int32 FluoreSlotCount = 14;	// 镶嵌孔数 0 - 5
	repeated int32 FluoreSlot = 15; // 每个镶嵌孔洞的属性 id:value/100  level:value%100
}

// 背包添加新的物品(测试用)  返回
message G2C_AddBackpackItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 丢弃背包物品  推送G2C_ItemsLeaveBackpack_notice
message C2G_DelBackpackItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;
	// 丢弃到指定位置 距离小于 10
	int32 PosInSceneX	= 2;
	int32 PosInSceneY	= 3;
}

// 丢弃背包物品  返回
message G2C_DelBackpackItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//推送客户端背包中有物品进入 选择角色进入游戏场景时会推送玩家背包里现有物品
message G2C_ItemsIntoBackpack_notice  // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	repeated Struct_ItemInBackpack_Status allItems = 1;
}

//推送客户端背包中有物品离开
message G2C_ItemsLeaveBackpack_notice  // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64 GameUserId			= 1;	// 实体玩家的背包
	int64 LeaveItemUUID		= 2;	// 离开背包的物品UUID
}

//推送客户端背包中有物品位置变动
message G2C_ItemsLocationChangeBackpack_notice  // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64 GameUserId		= 1;
	int64 ItemUUID			= 2;
	int32 PosInBackpackX	= 3;
	int32 PosInBackpackY	= 4;
}

//玩家使用背包中的物品
message C2G_PlayerUseItemInTheBackpack  // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;	// 使用的物品
}

//返回 玩家使用背包中的物品
message G2C_PlayerUseItemInTheBackpack  // IActorResponse
{	
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	int64	GameUserId			= 1;	// 使用物品的实体uuid
	int64	ItemUUID		    = 2;	// 使用的物品uuid
	int32	ConfigId			= 3;	// 物品配置表id
}

//广播物品属性变动  
message G2C_ItemsPropChange_notice // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64	ItemUUID  = 1;
	repeated Struct_Property PropList = 2;
	int64 GameUserId = 3;
	int32 Scene = 4;//应用场景 0:默认 2:仓库 3:交易 4:摆摊
}


// 广播物品属性词条变动
message G2C_ItemsAttrEntryChange_notice	// IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64	ItemUUID  = 1;
	repeated Struct_AttrEntry ExecllentEntry = 2;	// 卓越属性
	int64	GameUserId = 3;
	int32 Scene = 4;//应用场景 0:默认 2:仓库 3:交易 4:摆摊
	repeated Struct_AttrEntry ExtraEntry = 5;	// 额外属性词条。套装附带
	repeated Struct_AttrEntry SpecialEntry = 6;	// 特殊属性词条。翅膀
}

//广播玩家背包金币数值变动  
message G2C_BackpackGoldChange_notice // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64 GameUserId		= 1;
	int64 Gold  = 2;
}

message ItemPositionInBackpack 
{
	int64 ItemUID = 1;
	int32 PosInBackpackX = 2;
	int32 PosInBackpackY = 3;
}

// 整理背包
message C2G_OrganizeBackpack  // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	repeated ItemPositionInBackpack ItemsNewPosition = 1;	// 物品在背包中的新位置
}

message G2C_OrganizeBackpack  // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//=========================NPC商店=========================
// Opcode = 11150
//获取商店NPC的全部物品
message C2G_GetShopNPCItems // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 NPCUUID			= 1;	// NPC的实体ID
}

//获取商店NPC的全部物品  返回
