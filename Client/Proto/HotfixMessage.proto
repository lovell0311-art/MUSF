}

//=========================装备============================
// Opcode = 11200
// 穿戴装备物品  成功会推送G2C_ItemsLeaveBackpack_notice更新背包物品
message C2G_EquipItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;
	int32 EquipPosition = 2;	// 穿戴部位
}

// 穿戴装备物品  返回
message G2C_EquipItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 卸下装备物品  成功会推送G2C_ItemsIntoBackpack_notice更新背包物品
message C2G_UnloadEquipItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int32 EquipPosition	= 1;
	int32 PosInBackpackX = 2;
	int32 PosInBackpackY = 3;
}

// 卸下装备物品  返回
message G2C_UnloadEquipItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//推送实体穿戴装备(周边一定范围玩家也广播)
message G2C_UnitEquipLoad_notice  // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
    repeated Struct_ItemInSlot_Status allEquipStatus = 1;	//广播实体改动的装备
}

//推送实体卸下装备(周边一定范围玩家也广播)
message G2C_UnitEquipUnload_notice  // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	int64 GameUserId = 1;		// 实体玩家的ID
	int64 EquipItemUUID	= 2;	// 卸下物品UUID 
	int32 EquipPosition = 3;	// 卸下部位
}

//---------卡槽中的物品状态-------------
message Struct_ItemInSlot_Status
{
	int64 GameUserId 	= 1;	// 实体玩家的ID
	int64 ItemUID		= 2;	// 物品唯一标识
	int64 ConfigID		= 3;	// 物品配置ID
	int32 SlotID		= 4;	// 实体卡槽 0 - 14
	int32 ItemLevel		= 5;	// 物品等级
}

// 维修装备 请求
message C2G_RepairEquipItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	// 维修价格 > 0 的装备
	repeated int32 EquipPosition	= 1;	// 指定装备栏id
	// 在npc处维修需要传下面的参数，检查距离 10 格内的npc,且配置表中 NpcType 为 3
	int64 NpcUID = 2;	// 在哪个npc维修的 距离不超过10格
	int32 NpcPosX = 3;	// npc坐标
	int32 NpcPosY = 4;
}

// 维修装备 返回
message G2C_RepairEquipItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 替换装备物品  返回
message C2G_ReplaceEquipItemRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;
	int32 EquipPosition = 2;	// 穿戴部位
}

// 替换装备物品  返回
message G2C_ReplaceEquipItemResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 获取 装备栏物品属性
message C2G_GetEquipItemAllPropRequest	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 GameUserId = 1;
	int32 EquipPosition = 2;
}

message C2G_GetEquipItemAllPropResponse	// IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	Struct_ItemAllProperty AllProperty = 1;
}

// 玩家关闭了装备界面
// 只有左手装备武器时，会将武器移到右手
message C2G_CloseEquipUIRequest	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
}

message G2C_CloseEquipUIResponse // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}


//=======================合成====================
// Opcode = 11300
// -----------合并、升级背包中单个物品-------------
// 如两个 药水 数量未到上限，可以进行合并(暂未实现)
// 武器、防具等升级+1~+9
// 武器、防具追加属性
// 武器、防具等再生属性添加、进化
message C2G_MergeSingleItems // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;	// 拖拽的物品 如宝石、需要合并的物品
	int64 TargetItemUUID = 2;	// 目标物品 如防具、需要合并的物品
}

// 合并、升级背包中单个物品  返回
message G2C_MergeSingleItems // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 拆分、分堆物品功能   成功会推送拆分物品进入背包和物品数量变化
message C2G_SplitItems // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 ItemUUID		= 1;	// 要拆分、分堆的目标物品
	int32 Count = 2;	// 目标物品要拆出的数量
}

// 拆分、分堆物品功能  返回
message G2C_SplitItems // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

// 利用合成公式合成物品
message C2G_ItemsSynthesis // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	repeated int64 AllItemUUID = 1;	// 合成原材料
	int32 MethodConfigID = 2;				// 合成方法ConfigID(从合成配置表查询)
	int32 ClientFinalR = 3;//客户端最终成功率
}

// 利用合成公式合成物品  返回
message G2C_ItemsSynthesis // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	// 合成结果
	// true.合成成功
	// false.合成失败(合成异常请看Error错误码，这里只表示正常情况下的合成失败)
	bool	Result			= 1;
	repeated Struct_ItemInBackpack_Status AddedItem	= 2;
}

//背包物品到临时空间
message C2G_MoveBackpackItemToCacheSpace // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	// 需要移到缓存中的物品
	int64	MovedItemUUID		= 1;
}

//背包物品到临时空间 返回
message G2C_MoveBackpackItemToCacheSpace // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}

//临时空间到背包物品
message C2G_MoveCacheSpaceItemToBackpack // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	// 需要移到背包中的物品
	int64	MovedItemUUID		= 1;
	// 将物品移到背包中的坐标
	int32	PosInBackpackX	= 2;
	int32	PosInBackpackY	= 3;
}

//临时空间到背包物品 返回
message G2C_MoveCacheSpaceItemToBackpack // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}


