	//0:一般商城1:元宝商城
	int32 ShopMall = 1;
	int32 ShopId = 2;// 商城ID
    int32 Id = 3;// 道具ID
	int32 ItemCnt =4;//购买数量
	int32 ShopType = 5;//类型
}
message G2C_ShopMallBuyItemResponse // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}
