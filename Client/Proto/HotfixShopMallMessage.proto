message TreasureHouseItemInfo
{
	int64  Uid = 1;//道具ID
	int64  UserID = 2;//出售者ID
	string Name = 3;//道具名称
	string Class = 4;//职业类型
	int32  Excellent = 5;//卓越条数
	int32  Enhance = 6;//强化等级
	int32  Readdition = 7;//追加等级
	int32  Price = 8;//价格
	int32  AreaId =9;//区服Id
	int32  ConfigID = 10;
	int64  EndTime = 11;//到期下架时间
	int32  Cnt = 12;//数量
}

message TransactionRecord
{
	string ItemName = 1;//道具名
	int32 Price = 2;//交易金额
	int32 ActualPrice = 3;//扣除手续费后到账金额
	int32 Type = 4;//出售还是购买0=出售1=购买
}


// =========================
// 直冲礼包协议
// =========================
// Opcode = 38500

// 物品基础信息
message ItemBaseInfo
{
	int64 Id = 1;		// 物品id
	int32 ConfigId = 2;	// 配置表id
	int32 Count = 3;	// 物品数量
	int32 Leve = 4;		// 物品等级
	int32 SetId = 5;	// 套装id
	
	bool HaveSkill = 20;	// 有技能
	bool HaveLucky = 21;	// 有幸运
	bool HaveExcellent = 22;// 有卓越
	bool HaveSet = 23;		// 有套装
	bool HaveSock = 24;		// 有镶嵌
}

// 礼包信息
message RecGiftBundleInfo
{
	int64 Id = 1;		// 礼包id
	int32 ConfigId = 2; // 配置表id
	string Name = 3;	// 礼包名
	int64 LeftTime = 4;	// 剩余时间(秒)
	int32 Price = 5;	// 价格
	int32 LeftBuyCount = 6;// 剩余购买数量
	
	
	int32 OriginPrice = 10;// 原价
	int32 BuyCount = 11;// 购买次数
}

// 获取直冲礼包
