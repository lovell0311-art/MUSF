message C2G_QuickPurchaseRequest // IActorRequest
{
	int32		RpcId 			= 90;
	int64 		ActorId 		= 91;
	int64 		AppendData		= 92;
	
	int32		Cnt	=1;//组数
	int32		ItemConfigId =2;//道具Id
}
message G2C_QuickPurchaseResponse // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}
message ShopProp
{
    int32 ShopId = 1;// 商城ID
    int32 Id = 2;// 道具ID
    int32 Price=3;// 价格
    string ItemIcon=4;// 物品标识
    string Introduce=5;// 物品介绍
    int64 StartTime =6;// 限时起点秒
    int64 EndTime=7;// 限时终点秒
    int32 Discount =8;// 折扣
	int32 BuyMaxlimit = 9;//购买限制单次购买最大组数
	string ItemName = 10;//物品名称
	int32 ItemTime =11;//使用期限
	int32 BuyMinlimit = 12;//购买限制单次购买最小组数
	int32 UnitQuantity = 13;////购买限制单次购买每组数量
	int32 LimitCnt = 14;//库存
	int32 Gemtypes = 15;//需要的宝石种类
}

message PlayerShop
{
	int32 CurrentYuanbao =1;//当前元宝数量
	int32 RechargeStatus = 2;//状态DeviationType枚举
	int64 MinMCEndTime = 3;//小月卡到期时间
	int64 MaxMCEndTime =4;//大月卡到期时间
	int32 AccumulatedRecharge =5;//累计充值额度
	int64 InSituCd =6;//原地复活cd到期时间
	int32 MiracleCoin =7;//奇迹币
} 

message ItemInBackpack_Status
{
	// 背包所属玩家ID
	int64 GameUserId		= 1;
	// 物品唯一标识
	int64 ItemUID		= 2;
	// 物品配置表ID
	int32 ConfigID		= 3;
	// 物品类型ID
	int32 Type		= 4;
	// 物品在背包中的位置
	int32 PosInBackpackX	= 5;
	int32 PosInBackpackY	= 6;
	// 物品占用的格子
	int32 Width	= 7;
	int32 Height = 8;
	// 物品数量
	int32 Quantity	= 9;
	// 物品等级
	int32 ItemLevel	= 10;
}

// 物品所有的属性
message ItemAllProperty
{
	int64 ItemUUID = 1;
	repeated Property PropList = 2;
	repeated AttrEntry ExecllentEntry = 3;
}
//--------属性结构-------------
message Property
{ 
	int32	PropID = 1;			// 属性ID
	int32	Value = 2;				// 属性值
}

//--------物品属性词条结构---------
message AttrEntry
{
	int32	PropId = 1;		// 配置表中的属性id
	int32	Level = 2;		// 属性等级
}


