syntax = "proto3";
package ETHotfix;

// Opcode = 38000
//打开商城界面
message C2G_OpenShopMallRequest // IActorRequest
{
	int32		RpcId 			= 90;
	int64 		ActorId 		= 91;
	int64 		AppendData		= 92;
	
	//0:一般商城1:元宝商城
	int32		ShopMall		= 1;
	//1=buff类2=消耗类3=宠物坐骑类4=特殊类
	int32		ShopType		= 2;
}
message G2C_OpenShopMallResponse // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated ShopProp ItemList = 1;
}
//购买
