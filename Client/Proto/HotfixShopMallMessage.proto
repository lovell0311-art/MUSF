// =========================
// 抽奖协议
// =========================
// Opcode = 38550

// 抽奖奖品信息
message LotteryGiftInfo
{
	int64 Id = 1;
	string ItemIcon = 2;
	string ItemName = 3;
}

message LotteryLog
{
	int64 LogId = 1;
	int64 UserId = 2;
	int64 GameUserId = 3;
	string NickName = 4;
	string Desc = 5;
}

// 打开抽奖界面
message C2G_OpenLotteryWin	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
}

message G2C_OpenLotteryWin	// IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated LotteryGiftInfo AllGiftInfo = 1;
	int32 TotalCount = 3;		// 已经抽取了多少次数
	int32 TotalCountMax = 4;	// 保底次数
}

// 开始抽奖
message C2G_StartLottery	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int32 Count = 1;	// 抽取次数
}


message G2C_StartLottery	// IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated int64 Ids = 1;
	int32 TotalCount = 3;		// 已经抽取了多少次数
	int32 TotalCountMax = 4;	// 保底次数
	int32 IsSendMail = 5; 		// 0.直接进入背包 1.背包已满，通过邮件发送
}

// ◄─StartLogId        EndLogId─►
//       │                 │
//       ▼                 ▼
//────────────────────────────────►
// 获取历史抽奖日志
message C2G_GetHistoryLotteryLog	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	
	int64 GameUserId = 1;	// 要查询的角色Id 0.为查询全部
	int64 StartLogId = 2;		// 获取抽奖日志的开始位置 0.为获取最新的记录
	int32 Count = 3;		// 获取记录条数 最大 20条
}

message G2C_GetHistoryLotteryLog	// IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated LotteryLog AllLog = 1;
	int64 StartLogId = 2;
	int64 EndLogId = 3;
}

// 获取抽奖日志
message C2G_GetLotteryLog	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 GameUserId = 1;	// 要查询的角色Id 0.为查询全部
	int64 EndLogId = 2;		// 获取抽奖日志的结束位置 0.为获取最新的记录
	int32 Count = 3;		// 获取记录条数 最大 20条
}

message G2C_GetLotteryLog	// IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated LotteryLog AllLog = 1;
	int64 EndLogId = 3;
}

