// 发送邮件
message GM2Game_SendMail // IRequest
{
	int32 RpcId = 90;
	
	int32 ZoneId = 1;
	int64 UserId = 2;
	int64 GameUserId = 3;
	string Name = 4;
	string Content = 5;
	string MailItemsBson = 6;
}

message Game2GM_SendMail // IResponse
{
	int32 RpcId = 90;
    int32 Error = 91;
    string Message = 92;
}

// 获取游戏服状态
message GM2Game_GetGameServerStatus // IRequest
{
	int32 RpcId = 90;
}

message Game2GM_GetGameServerStatus // IResponse
{
	int32 RpcId = 90;
    int32 Error = 91;
    string Message = 92;
	
	int32 OnlineCount = 1;			// 在线人数
	int32 EnterGameCount = 2;	// 游戏中的人数
}

// 运行代码
message GM2S_RunCode	// IRequest
{
	int32 RpcId = 90;
	
	string Code = 1;
}

message S2GM_RunCode	// IResponse
{
	int32 RpcId = 90;
    int32 Error = 91;
    string Message = 92;
	
	string Return = 1;
}