message PetsInfo
{
	int32	PetsConfigID =1;//配置表ID
	int64	PetsID =2;//宠物唯一ID
	string	PetsName =3;//宠物名称
	int32	PetsType =4;//宠物类型
	int32 	PetsLevel =5;//宠物等级
	int32	PetsLVpoint =6;//自由点数
	int32	PetsHP =7;//当前血量
	int32	PetsHPMax =8;//最大血量
	int32	PetsMP =9;//当前魔法值
	int32	PetsMPMax =10;//最大魔法值
	int32	PetsSTR =11;//力量
	int32	PetsDEX = 12;//敏捷
	int32	PetsPSTR =13;//体力
	int32	PetsPINT =14;//智力
	int32	PetsMinATK =15;//最小攻击力
	int32	PetsMaxATK =16;//最大攻击力
	int32	PetsASM =17;//攻击成功率
	int32	PetsPAR =18;//PVP攻击率
	int32	PetsDEF =19;//防御力
	int32	PetsDFR =20;//防御率
	int32	PetsSPD =21;//攻速
	int32	PetsPDFR =22;//PVP防御率
	int32	PetsSATK =23;//技能攻击力
	int32	PetsMinINT =24;//最小魔力
	int32	PetsMaxINT =25;//最大魔力
	int64	PetsEXP =26;//宠物经验
	int32	PetsSkillID =27;//正在使用的技能
	int64	PetsTrialTime =28;//体验时间
	int32	IsDeath =29;//是否死亡
	int64	DeathTime = 30;//死亡等待时间
	int32   Elv = 31;//强化等级
	int32   AdvancedLevel = 32;//进阶等级
}

message PetsItem
{
	int32	ItemConfingID =1;
	int64	ItemID =2;//在宠物强化里面是需要道具的数量
	int32	ItemCnt =3;
}

message PetsRankInfo
{
	int32	PetsConfigID =1;//配置表ID
	int64	PetsID =2;//宠物唯一ID
	int32 	PetsLevel =3;//宠物等级
	int64	PetsTrialTime =4;//体验时间
	int32	IsDeath =5;//是否死亡
	int64	DeathTime = 6;//死亡等待时间
	int32	Point =7;//属性点数
	int32   ELvis = 8;//强化等级
}

//****************宠物改版****************

//打开新宠物界面
message C2G_OpenNewPetsUI // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
}

message G2C_OpenNewPetsUI // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
			
	repeated NewPetsInfo PetList = 1;//宠物列表
}
message NewPetsInfo
{
	int32	PetsConfigID =1;//配置表ID
	int64	PetsID =2;//宠物唯一ID
	repeated int32 SkillID = 3;//基础属性
	repeated int32 Excellent = 4;//卓越属性
	int32 ISBattle = 5;//1是使用中
	int64  DaoQiTime = 6;//到期时间
}
