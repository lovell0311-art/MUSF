syntax = "proto3";
package ETHotfix;

// Opcode = 35000
//打开宠物界面
message C2G_OpenPetsInterfaceRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
}
//打开宠物界面 返回
message G2C_OpenPetsInterfaceResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	PetsInfo Current=1;
	repeated PetsRankInfo List = 2;
	int32	 IsToWar =3;
}

//获取宠物信息
message C2G_GetPetsInfoRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	int64 PetsID = 1;
}
//获取宠物信息 返回
message G2C_GetPetsInfoResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	PetsInfo Info = 1;
}

