syntax = "proto3";
package ETHotfix;

// Opcode = 30000
message G2C_TestHotfixMessage // IMessage
{
	string Info = 1;
}

//=========================注册账号 登录账号============================
// 注册账号 登录账号
message C2R_RegisterOrLoginRequest // IRequest
{
	int32 RpcId = 90;
	
	string  Account = 1;  // 帐号
	string  Password = 2;  // 密码
	string VerificationCode = 3;// 验证码
	int32 LoginType = 4;//登录类型 0登录 1注册
	string TerminalIP = 5;//登录ip
	string ChannelId = 6;//运营商Id
	string DeviceNum = 7;//设备码
	string DeviceType = 8;//登录设型号(IPhone 7, vivo NEX 等)
	int32 OSType = 9;//系统类型 1苹果, 2安卓, 3windows
	string BaseVersion = 10;//版本号 (保留) 手机系统版本号
    string CPUType = 11;//cpu 类型
	string Code = 12;//推广码
}
// 注册账号 登录账号 返回
message R2C_RegisterOrLoginResponse // IResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	string Address = 1;
	int64 Key = 2;
	int64 GateId = 3;
	// 封禁到什么时候 时间戳 毫秒
	int64 BanTillTime = 4;
	// 封禁原因
	string BanReason = 5;
	
	int64 UserId = 6;
	string SelfIP = 7;
}

//=========================登录网关============================
// 登录网关
message C2G_LoginGateRequest // IRequest
{
	int32 RpcId = 90;
	int64 Key = 1;  // 帐号
	int64 GateId = 2;
	string ChannelId = 3;//运营商Id
}
// 登录网关 返回
message G2C_LoginGateResponse // IResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	int64 PlayerId = 1;
	int64 NewKey = 2;
}


//=========================申请验证码============================
// 申请验证码
message C2R_LoginSystemSMSApplyCodeRequest // IRequest
{
	int32 RpcId = 90;
	
	string  PhoneNumber = 1;  // 帐号
	string  CountryCode = 2;  // 国家码
	int32 UseType = 3;// 0注册  1:修改密码
	
}
// 申请验证码 返回
message R2C_LoginSystemSMSApplyCodeResponse // IResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
}


//=========================请求游戏区服信息============================
// 请求游戏区服信息   
message C2G_LoginSystemGetServerInfoRequest // IRequest
{	
	int32 RpcId = 90;
	
    int32 GetGameAreaPage = 1;// 0 获取上次 1获取最近20 2 20-40
}
// 请求游戏区服信息  返回   
message G2C_LoginSystemGetServerInfoResponse // IResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated G2C_LoginSystemServerInfoMessage GameAreaInfos = 3;//游戏区服信息
}
// 游戏区服信息 结构体
message G2C_LoginSystemServerInfoMessage // IMessage
{
    int32 GameAreaId = 1;//游戏区服ID 
	string GameAreaNickName = 2;//游戏区服昵称
	int32 GameAreaType = 3;//游戏区服状态  0正常 1爆满 2新服
	int32 IsGameAreaState = 4;//状态 1开启 0关闭
}


//=========================请求游戏区服线路信息============================
// 请求游戏区服线路信息   
message C2G_LoginSystemGetServerLineInfoRequest // IRequest
{	
	int32 RpcId = 90;
	
	int32 GetGameAreaPage = 1;// 0 获取上次 1获取最近20 2 20-40
	int32 AreaId = 3;//目标区服
}
// 请求游戏区服线路信息  返回   
message G2C_LoginSystemGetServerLineInfoResponse // IResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated G2C_LoginSystemServerLineInfoMessage GameAreaInfos = 3;//游戏区服线路信息
}
message G2R_GetServerLineInfoRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
}

message R2G_GetServerLineInfoResponse  // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated G2C_LoginSystemServerInfoMessage GameAreaInfos = 1;//游戏区服线路信息
}
// 游戏区服信息 结构体
message G2C_LoginSystemServerLineInfoMessage // IMessage
{
    int32 GameAreaId = 1;//游戏区服ID 
	string GameAreaNickName = 2;//游戏区服昵称
	int32 GameAreaType = 3;//游戏区服状态  0正常 1爆满 2新服
	int32 IsGameAreaState = 4;//状态 1开启 0关闭
}

message GM2R_UpdateArwaInfo // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	string AreaInfo = 1;
}
message G2All_UpdateCommandInfo // IActorMessage
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	
	string Command = 1;
	int32 AreaId = 2;
}

//=========================请求进入游戏区服============================
// 请求进入游戏区服
message C2G_LoginSystemEnterGameAreaMessage // IRequest
{
	int32 RpcId = 90;
    int32 GameAreaId = 1;//游戏区服ID
	int32 LineId = 2;//游戏区线路id
}
// 请求进入游戏区服  返回
message G2C_LoginSystemEnterGameAreaMessage // IResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated int64 GameIds = 3;//游戏区角色信息
	repeated int64 GameOccupation = 4;//游戏角色id
}


//=========================获取角色信息============================
// 获取角色信息
message C2G_LoginSystemGetGamePlayerInfoRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	
	repeated int64 GameId = 2;//角色id
}
// 获取角色信息  返回
message G2C_LoginSystemGetGamePlayerInfoResponse // IActorResponse
{
    int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	repeated G2C_LoginSystemGetGamePlayerInfoMessage GameInfos = 3;//游戏区角色信息
}
// 角色信息 结构体
message G2C_LoginSystemGetGamePlayerInfoMessage // IMessage
{
	int64 GameId = 1;//角色id
	string NickName = 2;//角色昵称
	int32 PlayerType = 3;//角色类型
	int32 Level = 4;//角色等级
	repeated G2C_LoginSystemEquipItemMessage allEquipStatus = 5;	//实体的所有装备
	int32 OccupationLevel = 6;// 转职次数
}
//---------卡槽中的物品状态-------------
message G2C_LoginSystemEquipItemMessage // IMessage
{
	int64 GameUserId 	= 1;	// 实体玩家的ID
	int64 ItemUID		= 2;	// 物品唯一标识
	int64 ConfigID		= 3;	// 物品配置ID
	int32 SlotID		= 4;	// 实体卡槽 0 - 14
	int32 ItemLevel		= 5;	// 物品等级
}


