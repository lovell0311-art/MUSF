// 被服务器踢下线
message Gate2C_KickOffline	// IActorMessage
{
	int64 ActorId = 91;
	
	// 下线原因
	// 0.顶号
    // 1.服务器关闭
	// 2.gm 踢下线
    // 3.封号
	int32 DisconnectType = 1;
	// 封禁到什么时候 时间戳 毫秒
	int64 BanTillTime = 2;
	// 被踢下线的原因 （2、3 才有数据）
	string Reason = 3;
}

