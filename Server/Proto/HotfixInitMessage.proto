	int32 OSType = 9;//系统类型 1苹果, 2安卓, 3windows
	string BaseVersion = 10;//版本号 (保留) 手机系统版本号
    string CPUType = 11;//cpu 类型
	string Idcard = 12;//身份证后几位
}

message R2C_ResetPasswordByPhoneNumberResponse	// IResponse
