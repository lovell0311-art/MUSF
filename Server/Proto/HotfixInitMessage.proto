// 断开连接，服务器将不会等待客户端重连
// 玩家关闭游戏时请求
message C2Gate_Disconnect // IActorMessage
{
	int64 ActorId = 91;
}

// 重新进入游戏，服务器会将session切换成断线前的
// 服务器会将断线期间的数据包重新发送
message C2Gate_Reconnect	// IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;

	int64 Key = 1;
}

message Gate2C_Reconnect	 // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	int64 NewKey = 2;
}

// 用于重连 gate 的 key
// 客户端收到后，需要保存。（用于下次重连）
message Gate2C_GateSessionKeyChange 	// IActorMessage
{
	int64 ActorId = 91;

	int64 NewKey = 1;
}


message C2R_ResetPasswordByPhoneNumberRequest	// IRequest
