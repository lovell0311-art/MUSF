	//level
	int32 GameLevel =3;
	//Serverid
	int32 GameServerID =4;
	//state
	int32 MeberState =5;
	//Type申请过期删除 1是删除申请
	int32 Type =6;
	string Name =7;
	int32 AllianceScore=8;
}

