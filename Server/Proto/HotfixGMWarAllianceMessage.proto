}

//藏宝阁
message GMTreasureHouseItemInfo
{
	int64  Uid = 1;//道具ID
	int64  UserID = 2;//出售者ID
	string Name = 3;//道具名称
	string  Class = 4;//职业类型
	int32  Excellent = 5;//卓越条数
	int32  Enhance = 6;//强化等级
	int32  Readdition = 7;//追加等级
	int32  Price = 8;//价格
	int32  AreaId = 9;
	int32  ConfigID = 10;
	int64  EndTime = 11;//到期下架时间
	int32  Cnt = 12;//道具数量
}

//打开藏宝阁
message G2M_OpenTreasureHouse // IActorRequest
{
	int32		RpcId 			= 90;
	int64 		ActorId 		= 91;
	int64 		AppendData		= 92;
	
	int32 	MaxType = 1;//打开的大类型默认1
	int32	MinType = 2;//
	int64   GameUserID = 3;
}

message M2G_OpenTreasureHouse // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	int32 Page = 1;//页签
	repeated GMTreasureHouseItemInfo ItemList = 2;//返回的物品
}
//收索道具
message G2M_SearchForItems // IActorRequest
{
	int32		RpcId 			= 90;
	int64 		ActorId 		= 91;
	int64 		AppendData		= 92;	
	
	string Name = 1;//道具名称
	string Class = 2;//职业类型
	int32  Excellent = 3;//卓越条数
	int32  Enhance = 4;//强化等级
	int32  Readdition = 5;//追加等级
	int32  MaxType = 6;
	int64  GameUserID = 7;
	int32  SortType =8;//排序方式0降序1升序默认降序
}
message M2G_SearchForItems // IActorResponse
{
	int32 RpcId = 90;
	int32 Error = 91;
	string Message = 92;
	
	int32 Page = 1;//页签
	repeated GMTreasureHouseItemInfo ItemList = 2;//返回的物品
}
