message G2M_OpenMemberListRequest // IActorRequest
{
	int32 RpcId = 90;
	int64 ActorId = 91;
	int64 AppendData = 92;
	//战盟ID
	int64 WarAllianceID =1;	
	//类型 0是成员 1是申请
	int32 Type =2;
}

//GMS获取成员列表 返回
